<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11111b"/>
      <stop offset="50%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cba6f7"/>
      <stop offset="100%" style="stop-color:#f5c2e7"/>
    </linearGradient>
    <linearGradient id="flow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cba6f7;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#f5c2e7;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cba6f7"/>
      <stop offset="100%" style="stop-color:#f5c2e7"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cba6f7;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#cba6f7"/>
      <stop offset="80%" style="stop-color:#f5c2e7"/>
      <stop offset="100%" style="stop-color:#f5c2e7;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Large waterfall — background decoration -->
  <g transform="translate(60, 60) scale(0.8)" opacity="0.25">
    <rect x="0" y="80" width="140" height="3" rx="1.5" fill="#45475a"/>
    <rect x="140" y="180" width="150" height="3" rx="1.5" fill="#45475a"/>
    <rect x="290" y="270" width="160" height="3" rx="1.5" fill="#45475a"/>

    <path d="M40,80 C70,80 100,82 115,92 C130,105 132,130 135,150 C138,170 148,178 165,180 C180,180 200,180 230,180"
          fill="none" stroke="url(#flow)" stroke-width="3" stroke-linecap="round"/>
    <path d="M210,180 C240,180 270,182 285,192 C300,205 302,230 305,250 C308,265 318,270 335,272 C350,272 370,270 400,270"
          fill="none" stroke="url(#flow)" stroke-width="3" stroke-linecap="round"/>
    <path d="M380,270 C410,270 440,274 455,284 C470,298 472,320 475,345 C478,365 482,378 490,388"
          fill="none" stroke="url(#flow)" stroke-width="3" stroke-linecap="round"/>

    <circle cx="145" cy="170" r="2.5" fill="#cba6f7" opacity="0.7"/>
    <circle cx="153" cy="165" r="1.8" fill="#f5c2e7" opacity="0.6"/>
    <circle cx="140" cy="175" r="1.5" fill="#cba6f7" opacity="0.5"/>
    <circle cx="315" cy="260" r="2.5" fill="#f5c2e7" opacity="0.7"/>
    <circle cx="323" cy="255" r="1.8" fill="#cba6f7" opacity="0.6"/>
    <circle cx="310" cy="265" r="1.5" fill="#f5c2e7" opacity="0.5"/>
    <circle cx="480" cy="358" r="2.5" fill="#cba6f7" opacity="0.7"/>
    <circle cx="488" cy="352" r="1.8" fill="#f5c2e7" opacity="0.6"/>
  </g>

  <!-- Right side waterfall -->
  <g transform="translate(880, 280) scale(0.6)" opacity="0.15">
    <rect x="0" y="60" width="100" height="3" rx="1.5" fill="#45475a"/>
    <rect x="100" y="140" width="110" height="3" rx="1.5" fill="#45475a"/>
    <rect x="210" y="215" width="120" height="3" rx="1.5" fill="#45475a"/>

    <path d="M30,60 C50,60 70,62 80,70 C90,80 92,100 95,115 C98,130 105,138 120,140"
          fill="none" stroke="url(#flow2)" stroke-width="2" stroke-linecap="round"/>
    <path d="M150,140 C170,142 190,145 200,155 C210,168 212,188 215,200 C218,210 225,215 240,215"
          fill="none" stroke="url(#flow2)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="640" y="280" font-family="'Inter','SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="80" font-weight="800" fill="url(#title-grad)" text-anchor="middle"
        letter-spacing="18" filter="url(#glow)">CASCADE</text>

  <!-- Accent line -->
  <rect x="360" y="308" width="560" height="2.5" rx="1.25" fill="url(#accent-line)"/>

  <!-- Subtitle -->
  <text x="640" y="355" font-family="'Inter','SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="20" fill="#bac2de" text-anchor="middle"
        letter-spacing="5" font-weight="500">NATIVE MARKDOWN EDITOR</text>

  <!-- Tagline -->
  <text x="640" y="395" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace"
        font-size="13" fill="#6c7086" text-anchor="middle"
        letter-spacing="3">TAURI  ·  RUST  ·  COLLAB  ·  21 THEMES</text>

  <!-- Description -->
  <text x="640" y="445" font-family="'Inter','SF Pro Display','Segoe UI',sans-serif"
        font-size="15" fill="#585b70" text-anchor="middle" letter-spacing="1">
    Real-time collaboration  ·  Live preview  ·  Wiki-links  ·  Canvas whiteboard
  </text>

  <!-- Bottom org line -->
  <text x="640" y="590" font-family="'JetBrains Mono',monospace"
        font-size="11" fill="#45475a" text-anchor="middle" letter-spacing="2">
    github.com/Real-Fruit-Snacks/Cascade
  </text>
</svg>
