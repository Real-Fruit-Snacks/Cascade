<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: violet to pink -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>

    <!-- Secondary gradient: violet to pink (lower opacity) -->
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Tertiary gradient: wisps -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Title gradient -->
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>

    <!-- Subtle glow -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#7c3aed" flood-opacity="0.1" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame — thin, elegant -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#7c3aed" opacity="0.04"/>

    <!-- Stepped platforms — muted surface rectangles descending left-to-right -->
    <rect x="30" y="42" width="38" height="2.5" rx="1.25" fill="#bcc0cc"/>
    <rect x="60" y="68" width="40" height="2.5" rx="1.25" fill="#bcc0cc"/>
    <rect x="88" y="92" width="42" height="2.5" rx="1.25" fill="#bcc0cc"/>

    <!-- Flow 1: top platform cascading to mid platform -->
    <path d="M42,42 C52,42 58,44 62,50 C66,56 67,62 68,66 C69,68 72,68 78,68"
          fill="none" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Flow 2: mid platform cascading to lower platform -->
    <path d="M76,68 C84,68 88,70 92,76 C96,82 97,86 98,90 C99,92 104,92 112,92"
          fill="none" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Flow 3: lower platform cascading out -->
    <path d="M108,92 C116,92 120,94 124,100 C128,106 129,112 130,118"
          fill="none" stroke="url(#g1)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Secondary flow lines — lighter, offset -->
    <path d="M36,44 C46,46 52,50 56,56 C60,62 62,66 66,70 C68,72 74,70 82,70"
          fill="none" stroke="url(#g2)" stroke-width="1.8" stroke-linecap="round"/>

    <path d="M70,70 C80,72 86,76 90,82 C94,88 96,90 100,94 C102,96 108,94 118,94"
          fill="none" stroke="url(#g2)" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Tertiary wisps -->
    <path d="M48,42 C54,48 56,56 60,64"
          fill="none" stroke="url(#g3)" stroke-width="1.2" stroke-linecap="round"/>

    <path d="M84,68 C88,76 90,82 94,88"
          fill="none" stroke="url(#g3)" stroke-width="1.2" stroke-linecap="round"/>

    <!-- Splash dots at step landings -->
    <circle cx="68" cy="62" r="2" fill="#7c3aed" opacity="0.7"/>
    <circle cx="72" cy="60" r="1.5" fill="#ec4899" opacity="0.6"/>
    <circle cx="65" cy="66" r="1.5" fill="#7c3aed" opacity="0.5"/>

    <circle cx="98" cy="86" r="2" fill="#ec4899" opacity="0.7"/>
    <circle cx="102" cy="84" r="1.5" fill="#7c3aed" opacity="0.6"/>
    <circle cx="95" cy="90" r="1.5" fill="#ec4899" opacity="0.5"/>

    <circle cx="128" cy="112" r="2" fill="#7c3aed" opacity="0.7"/>
    <circle cx="132" cy="108" r="1.5" fill="#ec4899" opacity="0.6"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#7c3aed" opacity="0.25"/>
    <circle cx="80" cy="134" r="2" fill="#ec4899" opacity="0.25"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "CASCADE" — clean, bold, wide-tracked -->
  <text x="430" y="100"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="68" font-weight="800" letter-spacing="16"
        fill="url(#title)" text-anchor="middle">CASCADE</text>

  <!-- Thin separator line -->
  <line x1="290" y1="118" x2="570" y2="118"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.2"/>

  <!-- Tagline -->
  <text x="430" y="142"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#57534e" text-anchor="middle">NATIVE MARKDOWN EDITOR</text>

  <!-- Tech descriptor -->
  <text x="430" y="162"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#a8a29e" text-anchor="middle">TAURI  ·  RUST  ·  COLLAB  ·  21 THEMES</text>
</svg>
