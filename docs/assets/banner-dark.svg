<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11111b"/>
      <stop offset="50%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cba6f7"/>
      <stop offset="100%" style="stop-color:#f5c2e7"/>
    </linearGradient>
    <linearGradient id="flow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cba6f7;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#f5c2e7;stop-opacity:0.5"/>
    </linearGradient>
    <linearGradient id="flow3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cba6f7;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#f5c2e7;stop-opacity:0.2"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cba6f7"/>
      <stop offset="100%" style="stop-color:#f5c2e7"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cba6f7;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#cba6f7"/>
      <stop offset="80%" style="stop-color:#f5c2e7"/>
      <stop offset="100%" style="stop-color:#f5c2e7;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="none" stroke="#313244" stroke-width="1"/>

  <!-- Stepped Waterfall logomark — top-left decorative -->
  <g transform="translate(80, 80) scale(0.65)" opacity="0.35">
    <!-- Steps -->
    <rect x="0" y="60" width="100" height="3" rx="1.5" fill="#45475a"/>
    <rect x="100" y="140" width="110" height="3" rx="1.5" fill="#45475a"/>
    <rect x="210" y="215" width="120" height="3" rx="1.5" fill="#45475a"/>

    <!-- Flows -->
    <path d="M30,60 C50,60 70,62 80,70 C90,80 92,100 95,115 C98,130 105,138 120,140 C135,140 150,140 170,140"
          fill="none" stroke="url(#flow)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M150,140 C170,140 190,142 200,150 C210,160 212,180 215,195 C218,208 225,213 240,215 C255,215 275,215 290,215"
          fill="none" stroke="url(#flow)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M270,215 C290,215 310,218 320,226 C330,236 332,256 335,275 C338,290 342,300 350,308"
          fill="none" stroke="url(#flow)" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Splash dots -->
    <circle cx="105" cy="132" r="2" fill="#cba6f7" opacity="0.7"/>
    <circle cx="112" cy="128" r="1.5" fill="#f5c2e7" opacity="0.6"/>
    <circle cx="100" cy="136" r="1.5" fill="#cba6f7" opacity="0.5"/>
    <circle cx="225" cy="208" r="2" fill="#f5c2e7" opacity="0.7"/>
    <circle cx="232" cy="204" r="1.5" fill="#cba6f7" opacity="0.6"/>
    <circle cx="220" cy="212" r="1.5" fill="#f5c2e7" opacity="0.5"/>
    <circle cx="340" cy="294" r="2" fill="#cba6f7" opacity="0.7"/>
    <circle cx="347" cy="290" r="1.5" fill="#f5c2e7" opacity="0.6"/>
  </g>

  <!-- Stepped Waterfall — bottom-right decorative, mirrored -->
  <g transform="translate(850, 300) scale(0.55)" opacity="0.2">
    <rect x="0" y="60" width="100" height="3" rx="1.5" fill="#45475a"/>
    <rect x="100" y="140" width="110" height="3" rx="1.5" fill="#45475a"/>
    <rect x="210" y="215" width="120" height="3" rx="1.5" fill="#45475a"/>

    <path d="M30,60 C50,60 70,62 80,70 C90,80 92,100 95,115 C98,130 105,138 120,140 C135,140 150,140 170,140"
          fill="none" stroke="url(#flow2)" stroke-width="2" stroke-linecap="round"/>
    <path d="M150,140 C170,140 190,142 200,150 C210,160 212,180 215,195 C218,208 225,213 240,215 C255,215 275,215 290,215"
          fill="none" stroke="url(#flow2)" stroke-width="2" stroke-linecap="round"/>
    <path d="M270,215 C290,215 310,218 320,226 C330,236 332,256 335,275"
          fill="none" stroke="url(#flow2)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="600" y="265" font-family="'Inter','SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="68" font-weight="800" fill="url(#title-grad)" text-anchor="middle"
        letter-spacing="16" filter="url(#glow)">CASCADE</text>

  <!-- Accent line -->
  <rect x="340" y="290" width="520" height="2" rx="1" fill="url(#accent-line)"/>

  <!-- Subtitle -->
  <text x="600" y="330" font-family="'Inter','SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="16" fill="#bac2de" text-anchor="middle"
        letter-spacing="6" font-weight="500">NATIVE MARKDOWN EDITOR</text>

  <!-- Tech line -->
  <text x="600" y="365" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace"
        font-size="12" fill="#6c7086" text-anchor="middle"
        letter-spacing="4">TAURI  ·  RUST  ·  COLLAB  ·  21 THEMES</text>

  <!-- Feature pills -->
  <g transform="translate(255, 400)">
    <rect x="0" y="0" width="100" height="30" rx="15" fill="#313244" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="18" cy="15" r="4" fill="#cba6f7"/>
    <text x="30" y="20" font-family="'JetBrains Mono',monospace" font-size="11" fill="#cdd6f4">live edit</text>

    <rect x="118" y="0" width="110" height="30" rx="15" fill="#313244" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="136" cy="15" r="4" fill="#f5c2e7"/>
    <text x="148" y="20" font-family="'JetBrains Mono',monospace" font-size="11" fill="#cdd6f4">wiki-links</text>

    <rect x="246" y="0" width="90" height="30" rx="15" fill="#313244" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="264" cy="15" r="4" fill="#cba6f7"/>
    <text x="276" y="20" font-family="'JetBrains Mono',monospace" font-size="11" fill="#cdd6f4">collab</text>

    <rect x="354" y="0" width="95" height="30" rx="15" fill="#313244" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="372" cy="15" r="4" fill="#f5c2e7"/>
    <text x="384" y="20" font-family="'JetBrains Mono',monospace" font-size="11" fill="#cdd6f4">canvas</text>

    <rect x="467" y="0" width="130" height="30" rx="15" fill="#313244" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="485" cy="15" r="4" fill="#cba6f7"/>
    <text x="497" y="20" font-family="'JetBrains Mono',monospace" font-size="11" fill="#cdd6f4">21 themes</text>
  </g>

  <!-- Version badge -->
  <g transform="translate(540, 465)">
    <rect x="0" y="0" width="120" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <text x="60" y="19" font-family="'JetBrains Mono',monospace" font-size="11" fill="#6c7086" text-anchor="middle">v0.3.4 · MIT</text>
  </g>
</svg>
