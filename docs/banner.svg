<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11111b"/>
      <stop offset="50%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89b4fa"/>
      <stop offset="25%" style="stop-color:#b4befe"/>
      <stop offset="50%" style="stop-color:#cba6f7"/>
      <stop offset="75%" style="stop-color:#f5c2e7"/>
      <stop offset="100%" style="stop-color:#89b4fa"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89b4fa;stop-opacity:0.10"/>
      <stop offset="50%" style="stop-color:#cba6f7;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#f5c2e7;stop-opacity:0.04"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b4befe;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#89b4fa;stop-opacity:0.03"/>
    </linearGradient>
    <linearGradient id="wave3" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f5c2e7;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#cba6f7;stop-opacity:0.02"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89b4fa;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#89b4fa"/>
      <stop offset="35%" style="stop-color:#b4befe"/>
      <stop offset="50%" style="stop-color:#cba6f7"/>
      <stop offset="65%" style="stop-color:#f5c2e7"/>
      <stop offset="85%" style="stop-color:#b4befe"/>
      <stop offset="100%" style="stop-color:#89b4fa;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-subtle">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="800" height="280" rx="12" fill="none" stroke="#313244" stroke-width="1"/>

  <!-- Cascading wave shapes — layered for depth -->
  <path d="M0,185 Q120,155 240,175 T480,150 T720,165 T800,140 L800,280 L0,280 Z" fill="url(#wave1)"/>
  <path d="M0,215 Q160,190 320,205 T640,185 T800,170 L800,280 L0,280 Z" fill="url(#wave2)"/>
  <path d="M0,245 Q200,225 400,238 T800,210 L800,280 L0,280 Z" fill="url(#wave3)"/>

  <!-- Flowing cascade lines — curved paths suggesting flowing text/notes -->
  <g opacity="0.06">
    <path d="M40,55 Q180,35 320,70 Q460,105 620,60 Q720,35 780,48" fill="none" stroke="#89b4fa" stroke-width="1.5"/>
    <path d="M20,85 Q160,60 310,95 Q470,125 650,75 Q740,55 790,70" fill="none" stroke="#cba6f7" stroke-width="1"/>
    <path d="M30,70 Q170,48 315,82 Q475,115 640,68 Q730,48 785,58" fill="none" stroke="#f5c2e7" stroke-width="1"/>
  </g>

  <!-- Decorative dots — subtle markdown/note particles -->
  <g opacity="0.10">
    <circle cx="680" cy="48" r="1.5" fill="#89b4fa"/>
    <circle cx="700" cy="40" r="1" fill="#b4befe"/>
    <circle cx="720" cy="52" r="1.5" fill="#cba6f7"/>
    <circle cx="695" cy="62" r="1" fill="#f5c2e7"/>
    <circle cx="715" cy="36" r="1" fill="#89b4fa"/>
    <circle cx="740" cy="46" r="1.5" fill="#b4befe"/>
    <circle cx="660" cy="55" r="1" fill="#cba6f7"/>
    <circle cx="750" cy="58" r="1" fill="#f5c2e7"/>
    <circle cx="670" cy="38" r="1.5" fill="#89b4fa"/>
    <circle cx="755" cy="40" r="1" fill="#b4befe"/>
    <circle cx="80" cy="208" r="1.5" fill="#cba6f7"/>
    <circle cx="60" cy="218" r="1" fill="#89b4fa"/>
    <circle cx="100" cy="222" r="1.5" fill="#b4befe"/>
    <circle cx="75" cy="232" r="1" fill="#f5c2e7"/>
    <circle cx="45" cy="212" r="1" fill="#89b4fa"/>
    <circle cx="115" cy="215" r="1" fill="#cba6f7"/>
    <circle cx="130" cy="228" r="1.5" fill="#b4befe"/>
    <circle cx="50" cy="238" r="1" fill="#f5c2e7"/>
  </g>

  <!-- Title -->
  <text x="400" y="125" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="64" font-weight="bold" fill="url(#title-grad)" text-anchor="middle"
        letter-spacing="14" filter="url(#glow)">CASCADE</text>

  <!-- Accent line under title -->
  <rect x="180" y="143" width="440" height="2" rx="1" fill="url(#accent-line)"/>

  <!-- Subtitle -->
  <text x="400" y="175" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="13" fill="#bac2de" text-anchor="middle"
        letter-spacing="5">MARKDOWN KNOWLEDGE MANAGEMENT</text>

  <!-- Feature badges -->
  <g transform="translate(48, 205)">
    <!-- tauri -->
    <rect x="0" y="0" width="80" height="28" rx="14" fill="#313244"/>
    <rect x="0" y="0" width="80" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="16" cy="14" r="4" fill="#89b4fa"/>
    <text x="28" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">tauri</text>

    <!-- react -->
    <rect x="100" y="0" width="85" height="28" rx="14" fill="#313244"/>
    <rect x="100" y="0" width="85" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="116" cy="14" r="4" fill="#b4befe"/>
    <text x="128" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">react</text>

    <!-- codemirror -->
    <rect x="205" y="0" width="120" height="28" rx="14" fill="#313244"/>
    <rect x="205" y="0" width="120" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="221" cy="14" r="4" fill="#cba6f7"/>
    <text x="233" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">codemirror</text>

    <!-- canvas -->
    <rect x="345" y="0" width="95" height="28" rx="14" fill="#313244"/>
    <rect x="345" y="0" width="95" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="361" cy="14" r="4" fill="#f5c2e7"/>
    <text x="373" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">canvas</text>

    <!-- graph view -->
    <rect x="460" y="0" width="115" height="28" rx="14" fill="#313244"/>
    <rect x="460" y="0" width="115" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="476" cy="14" r="4" fill="#89b4fa"/>
    <text x="488" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">graph view</text>

    <!-- catppuccin -->
    <rect x="595" y="0" width="120" height="28" rx="14" fill="#313244"/>
    <rect x="595" y="0" width="120" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="611" cy="14" r="4" fill="#cba6f7"/>
    <text x="623" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">catppuccin</text>
  </g>
</svg>
