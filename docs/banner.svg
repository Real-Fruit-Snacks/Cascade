<svg xmlns="http://www.w3.org/2000/svg" width="800" height="280" viewBox="0 0 800 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11111b"/>
      <stop offset="50%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cba6f7"/>
      <stop offset="100%" style="stop-color:#f5c2e7"/>
    </linearGradient>
    <linearGradient id="flow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cba6f7;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#f5c2e7;stop-opacity:0.45"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cba6f7"/>
      <stop offset="100%" style="stop-color:#f5c2e7"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cba6f7;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#cba6f7"/>
      <stop offset="85%" style="stop-color:#f5c2e7"/>
      <stop offset="100%" style="stop-color:#f5c2e7;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="280" rx="12" fill="url(#bg)"/>
  <rect width="800" height="280" rx="12" fill="none" stroke="#313244" stroke-width="1"/>

  <!-- Stepped Waterfall — left decorative -->
  <g transform="translate(30, 35) scale(0.38)" opacity="0.30">
    <rect x="0" y="60" width="100" height="3" rx="1.5" fill="#45475a"/>
    <rect x="100" y="140" width="110" height="3" rx="1.5" fill="#45475a"/>
    <rect x="210" y="215" width="120" height="3" rx="1.5" fill="#45475a"/>

    <path d="M30,60 C50,60 70,62 80,70 C90,80 92,100 95,115 C98,130 105,138 120,140 C135,140 150,140 170,140"
          fill="none" stroke="url(#flow)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M150,140 C170,140 190,142 200,150 C210,160 212,180 215,195 C218,208 225,213 240,215 C255,215 275,215 290,215"
          fill="none" stroke="url(#flow)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M270,215 C290,215 310,218 320,226 C330,236 332,256 335,275 C338,290 342,300 350,308"
          fill="none" stroke="url(#flow)" stroke-width="2.5" stroke-linecap="round"/>

    <circle cx="105" cy="132" r="2" fill="#cba6f7" opacity="0.7"/>
    <circle cx="112" cy="128" r="1.5" fill="#f5c2e7" opacity="0.6"/>
    <circle cx="225" cy="208" r="2" fill="#f5c2e7" opacity="0.7"/>
    <circle cx="232" cy="204" r="1.5" fill="#cba6f7" opacity="0.6"/>
    <circle cx="340" cy="294" r="2" fill="#cba6f7" opacity="0.7"/>
  </g>

  <!-- Stepped Waterfall — right decorative -->
  <g transform="translate(620, 100) scale(0.32)" opacity="0.18">
    <rect x="0" y="60" width="100" height="3" rx="1.5" fill="#45475a"/>
    <rect x="100" y="140" width="110" height="3" rx="1.5" fill="#45475a"/>
    <rect x="210" y="215" width="120" height="3" rx="1.5" fill="#45475a"/>

    <path d="M30,60 C50,60 70,62 80,70 C90,80 92,100 95,115 C98,130 105,138 120,140 C135,140 150,140 170,140"
          fill="none" stroke="url(#flow2)" stroke-width="2" stroke-linecap="round"/>
    <path d="M150,140 C170,140 190,142 200,150 C210,160 212,180 215,195 C218,208 225,213 240,215"
          fill="none" stroke="url(#flow2)" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="400" y="115" font-family="'Inter','SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="64" font-weight="800" fill="url(#title-grad)" text-anchor="middle"
        letter-spacing="14" filter="url(#glow)">CASCADE</text>

  <!-- Accent line under title -->
  <rect x="180" y="133" width="440" height="2" rx="1" fill="url(#accent-line)"/>

  <!-- Subtitle -->
  <text x="400" y="165" font-family="'Inter','SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif"
        font-size="13" fill="#bac2de" text-anchor="middle"
        letter-spacing="5" font-weight="500">NATIVE MARKDOWN EDITOR</text>

  <!-- Tech line -->
  <text x="400" y="190" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace"
        font-size="10" fill="#6c7086" text-anchor="middle"
        letter-spacing="3">TAURI  ·  RUST  ·  COLLAB  ·  21 THEMES</text>

  <!-- Feature badges -->
  <g transform="translate(48, 210)">
    <rect x="0" y="0" width="98" height="28" rx="14" fill="#313244" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="16" cy="14" r="4" fill="#cba6f7"/>
    <text x="28" y="18" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#cdd6f4">live edit</text>

    <rect x="116" y="0" width="108" height="28" rx="14" fill="#313244" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="132" cy="14" r="4" fill="#f5c2e7"/>
    <text x="144" y="18" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#cdd6f4">wiki-links</text>

    <rect x="242" y="0" width="88" height="28" rx="14" fill="#313244" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="258" cy="14" r="4" fill="#cba6f7"/>
    <text x="270" y="18" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#cdd6f4">collab</text>

    <rect x="348" y="0" width="92" height="28" rx="14" fill="#313244" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="364" cy="14" r="4" fill="#f5c2e7"/>
    <text x="376" y="18" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#cdd6f4">canvas</text>

    <rect x="458" y="0" width="120" height="28" rx="14" fill="#313244" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="474" cy="14" r="4" fill="#cba6f7"/>
    <text x="486" y="18" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#cdd6f4">21 themes</text>

    <rect x="596" y="0" width="120" height="28" rx="14" fill="#313244" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="612" cy="14" r="4" fill="#f5c2e7"/>
    <text x="624" y="18" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" fill="#cdd6f4">graph view</text>
  </g>
</svg>
